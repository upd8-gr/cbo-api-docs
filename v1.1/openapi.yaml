openapi: 3.0.3
info:
  title: API v1.1
  version: 1.1.0
  x-logo:
    url: ../assets/logo.png
    altText: Upd8.gr
  description: |
    ## Authentication

    All API requests must include a **Bearer token** in the `Authorization` header.

    **Example:**
    ```
    Authorization: Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
    ```

    Obtain your token via the login endpoint or from [CBO](https://app.cbo.gr).

    ---

    ## Authorisation

    Every request must include the company context via the **X-Asseblo-Company** header with the company ID.

    **Example:**
    ```
    X-Asseblo-Company: 123123123123
    ```

    Use the company ID that corresponds to the tenant you are acting on behalf of.

    ---

    ## Rate limits

    | Limit | Value |
    |-------|--------|
    | Per day | 1000 API calls |
    | Per minute | 60 requests |

    When a limit is exceeded, the API returns **HTTP 429 Too Many Requests**.
servers:
  - url: https://app.cbo.gr/api/v1.1
    description: CBO production
security:
  - BearerAuth: []
  - XAssebloCompany: []
tags:
  - name: Invoices
  - name: Clients
  - name: Taxes
  - name: Invoice Types
  - name: Invoice Series
paths:
  /invoices:
    get:
      tags:
        - Invoices
      summary: List client invoices
      security:
        - BearerAuth: []
      parameters:
        - name: search
          in: query
          required: false
          schema:
            type: string
          example: INV-2026
        - name: search_fields
          in: query
          required: false
          description: Comma-separated searchable fields.
          schema:
            type: string
          example: serial_number,nickname
        - name: serial_number
          in: query
          required: false
          schema:
            type: integer
        - name: date_from
          in: query
          required: false
          schema:
            type: string
            format: date
        - name: date_to
          in: query
          required: false
          schema:
            type: string
            format: date
        - name: status
          in: query
          required: false
          style: form
          explode: true
          schema:
            oneOf:
              - type: string
              - type: array
                items:
                  type: string
        - name: document_type
          in: query
          required: false
          style: form
          explode: true
          schema:
            oneOf:
              - type: string
              - type: array
                items:
                  type: string
        - name: client_id
          in: query
          required: false
          schema:
            type: integer
        - name: document_id
          in: query
          required: false
          description: invoice_type_id
          schema:
            type: integer
        - name: series_id
          in: query
          required: false
          schema:
            type: integer
        - name: sort_by
          in: query
          required: false
          schema:
            type: string
            enum:
              - payment_date
              - serial_number
              - status
              - created_at
          example: payment_date
        - name: sort_order
          in: query
          required: false
          schema:
            type: string
            enum:
              - asc
              - desc
          example: desc
        - name: page
          in: query
          schema:
            type: integer
        - name: page_size
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvoiceIndexResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags:
        - Invoices
      summary: Create client invoice
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InvoiceStore'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvoiceSingleResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
  /invoices/{id}:
    get:
      tags:
        - Invoices
      summary: Show client invoice
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvoiceSingleResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /clients:
    get:
      tags:
        - Clients
      summary: List clients
      description: |
        Lists clients (isSeller=false) with optional search and client_type filtering. Response is paginated and wrapped as {success,data,meta}.
      security:
        - BearerAuth: []
      parameters:
        - name: search
          in: query
          required: false
          description: Search term (used only when search_fields is present).
          schema:
            type: string
          example: Papad
        - name: search_fields
          in: query
          required: false
          description: Comma-separated fields used in OR LIKE search.
          schema:
            type: string
          example: fname,lname,afm,email
        - name: client_type
          in: query
          required: false
          description: Filter by client type(s).
          style: form
          explode: true
          schema:
            oneOf:
              - type: integer
                enum:
                  - 1
                  - 2
              - type: array
                items:
                  type: integer
                  enum:
                    - 1
                    - 2
          examples:
            single:
              value: 1
            multiple:
              value:
                - 1
                - 2
        - name: sort_by
          in: query
          required: false
          schema:
            type: string
            enum:
              - id
              - primary_id
              - fname
              - lname
              - afm
              - email
              - client_type
              - created_at
              - updated_at
          example: id
        - name: sort_order
          in: query
          required: false
          schema:
            type: string
            enum:
              - asc
              - desc
          example: asc
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
          example: 1
        - name: page_size
          in: query
          required: false
          description: Page size (default 50, max 100).
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
          example: 50
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientIndexResponse'
              examples:
                default:
                  value:
                    success: true
                    data:
                      - id: 1
                        code: C-0001
                        first_name: Giorgos
                        last_name: Papadopoulos
                        email: g@example.com
                        telephone: '2100000000'
                        cellphone: null
                        vat: '123456789'
                        invoice_name: ACME SA
                        company_name: ACME SA
                        tax_office: Α Αθηνών
                        profession: null
                        client_type: 1
                        comments: null
                        addresses: []
                        company: 1
                        created: '2026-02-11 10:00:00'
                        modified: '2026-02-12 10:00:00'
                    meta:
                      current_page: 1
                      last_page: 1
                      per_page: 50
                      total: 1
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags:
        - Clients
      summary: Create client
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClientStore'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientSingleResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
  /clients/{id}:
    get:
      tags:
        - Clients
      summary: Show client
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientSingleResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags:
        - Clients
      summary: Update client (partial)
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClientUpdate'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientSingleResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
    put:
      tags:
        - Clients
      summary: Update client (replace)
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClientStore'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientSingleResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
    delete:
      tags:
        - Clients
      summary: Delete client
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientDeleteResponse'
              examples:
                deleted:
                  value:
                    success: true
                    message: Client deleted.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: Cannot be deleted (has related records)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientDeleteFailResponse'
              examples:
                fail:
                  value:
                    success: false
                    message: Client cannot be deleted because it has related records (invoices, orders, checks, etc.).
  /invoice-series:
    get:
      tags:
        - Invoice Series
      summary: List invoice series
      security:
        - BearerAuth: []
      parameters:
        - name: visible
          in: query
          required: false
          schema:
            type: boolean
          example: true
        - name: search
          in: query
          required: false
          schema:
            type: string
          example: retail
        - name: sort_by
          in: query
          required: false
          schema:
            type: string
            enum:
              - id
              - name
              - description
              - visible
              - company_id
          example: id
        - name: sort_order
          in: query
          required: false
          schema:
            type: string
            enum:
              - asc
              - desc
          example: asc
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
          example: 1
        - name: page_size
          in: query
          required: false
          description: Page size (default 50, max 100).
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
          example: 50
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/InvoiceSeries'
                  meta:
                    type: object
                    additionalProperties: false
                    properties:
                      current_page:
                        type: integer
                        example: 1
                      last_page:
                        type: integer
                        example: 3
                      per_page:
                        type: integer
                        example: 50
                      total:
                        type: integer
                        example: 120
                    required:
                      - current_page
                      - last_page
                      - per_page
                      - total
                required:
                  - success
                  - data
                  - meta
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags:
        - Invoice Series
      summary: Create invoice series
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InvoiceSeriesStore'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/InvoiceSeries'
                required:
                  - success
                  - data
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
  /invoice-series/{id}:
    get:
      tags:
        - Invoice Series
      summary: Show invoice series
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/InvoiceSeries'
                required:
                  - success
                  - data
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags:
        - Invoice Series
      summary: Update invoice series
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InvoiceSeriesUpdate'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/InvoiceSeries'
                required:
                  - success
                  - data
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
    put:
      tags:
        - Invoice Series
      summary: Replace invoice series
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InvoiceSeriesStore'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/InvoiceSeries'
                required:
                  - success
                  - data
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
  /invoice-types:
    get:
      tags:
        - Invoice Types
      summary: List invoice types
      description: |
        List invoice types (document types) with filters: type, document_type, active, search and sorting. Response is paginated and wrapped as {success,data,meta}.
      security:
        - BearerAuth: []
      parameters:
        - name: type
          in: query
          required: false
          description: Filter by invoice type(s). Can be single integer or array.
          style: form
          explode: true
          schema:
            oneOf:
              - type: integer
                enum:
                  - 1
                  - 2
                  - 3
                  - 4
                  - 5
                  - 6
                  - 7
              - type: array
                items:
                  type: integer
                  enum:
                    - 1
                    - 2
                    - 3
                    - 4
                    - 5
                    - 6
                    - 7
          examples:
            single:
              value: 3
            multiple:
              value:
                - 1
                - 3
                - 7
        - name: document_type
          in: query
          required: false
          description: Filter by document_type exact match.
          schema:
            type: string
            maxLength: 50
          example: delivery-note
        - name: active
          in: query
          required: false
          description: Filter by active flag.
          schema:
            type: boolean
          example: true
        - name: search
          in: query
          required: false
          description: Search by title (LIKE %...%).
          schema:
            type: string
          example: invoice
        - name: sort_by
          in: query
          required: false
          description: Sort column (backend orderBy).
          schema:
            type: string
            enum:
              - id
              - title
              - type
              - aade_type
              - document_type
              - active
              - is_deliverable
              - default
              - template_id
              - company_id
          example: id
        - name: sort_order
          in: query
          required: false
          schema:
            type: string
            enum:
              - asc
              - desc
          example: asc
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
          example: 1
        - name: page_size
          in: query
          required: false
          description: Page size (default 50, max 100).
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
          example: 50
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvoiceTypeIndexResponse'
              examples:
                default:
                  value:
                    success: true
                    data:
                      - id: 1166
                        title: Invoice (no delivery)
                        type: 1
                        aade_type: '1.1'
                        document_type: null
                        active: true
                        is_deliverable: false
                        default: true
                        template_id: null
                        company: 1
                    meta:
                      current_page: 1
                      last_page: 2
                      per_page: 50
                      total: 60
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /invoice-types/{id}:
    get:
      tags:
        - Invoice Types
      summary: Show invoice type
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvoiceTypeSingleResponse'
              examples:
                default:
                  value:
                    success: true
                    data:
                      id: 1166
                      title: Invoice (no delivery)
                      type: 1
                      aade_type: '1.1'
                      document_type: null
                      active: true
                      is_deliverable: false
                      default: true
                      template_id: null
                      company: 1
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags:
        - Invoice Types
      summary: Create invoice type
      description: |
        Creates an invoice type. If `default=true`, other invoice types with same (type, document_type) are set to default=false. If `default=false` and no other default exists, backend forces default=true.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InvoiceTypeStore'
            examples:
              default:
                value:
                  title: Invoice (no delivery)
                  type: 1
                  aade_type: '1.1'
                  document_type: null
                  fhm_code: null
                  active: true
                  is_deliverable: false
                  default: true
                  template_id: null
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvoiceTypeSingleResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
  /taxes:
    get:
      tags:
        - Taxes
      summary: List taxes
      description: |
        List taxes with filters: type, active, search and sorting. Response is paginated and wrapped as {success,data,meta}.
      security:
        - BearerAuth: []
      parameters:
        - name: type
          in: query
          required: false
          description: Filter by tax type(s). Can be single or array (backend-defined numeric types).
          style: form
          explode: true
          schema:
            oneOf:
              - type: integer
              - type: array
                items:
                  type: integer
          examples:
            single:
              value: 1
            multiple:
              value:
                - 1
                - 2
        - name: active
          in: query
          required: false
          description: Filter by active flag.
          schema:
            type: boolean
          example: true
        - name: search
          in: query
          required: false
          description: Search by title (LIKE %...%).
          schema:
            type: string
          example: ΦΠΑ
        - name: sort_by
          in: query
          required: false
          description: Sort column (backend orderBy).
          schema:
            type: string
            enum:
              - id
              - title
              - value
              - active
              - type
              - company_id
          example: id
        - name: sort_order
          in: query
          required: false
          schema:
            type: string
            enum:
              - asc
              - desc
          example: asc
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
          example: 1
        - name: page_size
          in: query
          required: false
          description: Page size (default 50, max 100).
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
          example: 50
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaxIndexResponse'
              examples:
                default:
                  value:
                    success: true
                    data:
                      - id: 1265
                        title: ΦΠΑ 24%
                        value: 24
                        type: VAT
                        operand: +
                        amount: null
                        percentage: 24
                        aade_group: '1'
                        aade_code: '1'
                        calculateVat: true
                        active: true
                    meta:
                      current_page: 1
                      last_page: 1
                      per_page: 50
                      total: 1
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /taxes/{id}:
    get:
      tags:
        - Taxes
      summary: Show tax
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaxSingleResponse'
              examples:
                default:
                  value:
                    success: true
                    data:
                      id: 1265
                      title: ΦΠΑ 24%
                      value: 24
                      type: VAT
                      operand: +
                      amount: null
                      percentage: 24
                      aade_group: '1'
