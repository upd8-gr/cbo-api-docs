  /countries:
    get:
      tags:
        - Countries
      summary: Countries (list)
      description: |
        Lists countries. Supports exact filtering by `code`, partial filtering by `name`, and pagination.
        Response is wrapped as `{ success, data, meta }`.
      security:
        - BearerAuth: []
      parameters:
        - name: code
          in: query
          required: false
          description: Exact country code filter.
          schema:
            type: string
          example: GR
        - name: name
          in: query
          required: false
          description: Partial country name filter using SQL `LIKE`.
          schema:
            type: string
          example: Greek
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: page_size
          in: query
          required: false
          description: Page size (default 50, max 100).
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CountryIndexResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: 'Send `Authorization: Bearer {token}`'
    XAssebloCompany:
      type: apiKey
      in: header
      name: X-Asseblo-Company
      description: 'Company ID. Example value: 1234567890'
  parameters:
    IdPath:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
      example: 1
  responses:
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            message: Unauthorized.
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            message: Forbidden.
    NotFound:
      description: Not Found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            message: Not Found.
    UnprocessableEntity:
      description: Validation error (Laravel)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationError'
  schemas:
    ClientForInvoiceResponse:
      type: object
      additionalProperties: false
      properties:
        id:
          type: integer
          format: int64
          example: 1
        first_name:
          type: string
          nullable: true
          example: Giorgos
        last_name:
          type: string
          nullable: true
          example: Papadopoulos
        email:
          type: string
          nullable: true
          example: g@example.com
        phone:
          type: string
          nullable: true
          example: '2100000000'
        mobile:
          type: string
          nullable: true
          example: null
        vat:
          type: string
          nullable: true
          example: '123456789'
        invoice_name:
          type: string
          nullable: true
          example: ACME SA
        company_name:
          type: string
          nullable: true
          example: ACME SA
    Address:
      type: object
      additionalProperties: true
      description: Minimal placeholder for AddressResource output.
      properties:
        id:
          type: integer
          format: int64
          example: 1
        address:
          type: string
          example: Main street
        number:
          type: string
          nullable: true
          example: '10'
        town:
          type: string
          example: Athens
        region:
          type: string
          nullable: true
          example: Attica
        tk:
          type: string
          description: Postal code.
          example: '10558'
        country:
          type: string
          nullable: true
          example: GR
        country_id:
          type: integer
          format: int64
          nullable: true
          example: 1
        branch_code:
          type: integer
          nullable: true
          example: 0
    TaxForInvoiceLine:
      type: object
      additionalProperties: false
      properties:
        id:
          type: integer
          format: int64
          example: 1265
        title:
          type: string
          example: ΦΠΑ 24%
        value:
          type: number
          example: 24
    InvoiceLine:
      type: object
      additionalProperties: false
      properties:
        id:
          type: integer
        product_id:
          type: integer
          nullable: true
        description:
          type: string
        quantity:
          type: number
          required: true
        unit_measure:
          type: string
        unit_price:
          type: number
        discount_price:
          type: number
          nullable: true
        net_amount:
          type: number
        taxes:
          type: array
          items:
            $ref: '#/components/schemas/TaxForInvoiceLine'
        mydata_classification_category:
          type: string
          nullable: true
        mydata_classification_type:
          type: string
          nullable: true
        vat_exemption_category:
          type: integer
          nullable: true
    Invoice:
      type: object
      additionalProperties: false
      properties:
        id:
          type: integer
        representation:
          type: string
          nullable: true
        status:
          type: string
          example: published
        document_title:
          type: string
          nullable: true
        invoice_type_id:
          type: integer
          nullable: true
        serial_number:
          type: integer
          nullable: true
        series:
          type: string
          nullable: true
        mydata_type:
          type: string
          nullable: true
        date:
          type: string
          format: date
        due_date:
          type: string
          format: date
          nullable: true
        client_id:
          type: integer
        client:
          $ref: '#/components/schemas/ClientForInvoiceResponse'
        billing_address:
          $ref: '#/components/schemas/Address'
        shipping_address:
          nullable: true
          $ref: '#/components/schemas/Address'
        loading_address:
          nullable: true
          $ref: '#/components/schemas/Address'
        payment_method:
          type: string
          nullable: true
        pos_tid:
          type: string
          nullable: true
        items:
          type: array
          items:
            $ref: '#/components/schemas/InvoiceLine'
        sub_total:
          type: number
        tax_total:
          type: number
        grand_total:
          type: number
        currency_code:
          type: string
          nullable: true
        exchange_rate:
          type: number
          nullable: true
        terms:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        public_link:
          type: string
          nullable: true
        mydata_qr_code:
          type: string
          nullable: true
        mydata_latest_mark:
          type: string
          nullable: true
        mydata_uid:
          type: string
          nullable: true
      required:
        - id
        - date
        - client_id
        - sub_total
        - tax_total
        - grand_total
    InvoiceIndexResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: array
          items:
            $ref: '#/components/schemas/Invoice'
        meta:
          type: object
          properties:
            current_page:
              type: integer
            last_page:
              type: integer
            per_page:
              type: integer
            total:
              type: integer
      required:
        - success
        - data
        - meta
    ErrorResponse:
      type: object
      additionalProperties: false
      properties:
        message:
          type: string
          example: Unauthorized.
      required:
        - message
    ClientAddressInputObject:
      type: object
      additionalProperties: false
      description: Single account address payload (inline object).
      properties:
        address:
          type: string
          maxLength: 255
          example: Main street
        number:
          type: string
          nullable: true
          maxLength: 50
          example: '10'
        town:
          type: string
          maxLength: 150
          example: Athens
        region:
          type: string
          nullable: true
          maxLength: 150
          example: Attica
        zip:
          type: string
          description: Will be mapped to `tk` internally.
          maxLength: 20
          example: '10558'
        country:
          type: string
          nullable: true
          maxLength: 3
          description: Country ISO code (exists:countries,code).
          example: GR
        country_id:
          type: integer
          format: int64
          nullable: true
          example: 1
        branch_code:
          type: integer
          nullable: true
          example: 0
      required:
        - address
        - town
        - zip
    InvoiceStore:
      type: object
      additionalProperties: false
      properties:
        invoice_type_id:
          type: integer
        invoice_series_id:
          type: integer
          nullable: true
        mydata_type:
          type: string
          nullable: true
          maxLength: 10
        serial_number:
          type: integer
          nullable: true
        date:
          type: string
          format: date
        due_date:
          type: string
          format: date
          nullable: true
        client_id:
          type: integer
        document_type:
          type: string
          enum:
            - invoice
            - credit-invoice
            - delivery-note
        vat_payment_suspension:
          type: boolean
          nullable: true
        grand_total:
          type: number
          minimum: 0
        billing_address:
          description: |
            Single address object. `zip` is accepted and normalized internally to `tk`; account linkage is injected automatically from `client_id`.
          $ref: '#/components/schemas/ClientAddressInputObject'
        shipping_address:
          nullable: true
          description: |
            Single address object. When present, the request also prepares `dispatch_detail` from the flat dispatch alias fields if provided.
          $ref: '#/components/schemas/ClientAddressInputObject'
        loading_address:
          nullable: true
          description: Single address object.
          $ref: '#/components/schemas/ClientAddressInputObject'
        dispatch_date:
          type: string
          format: date
          nullable: true
          description: Public alias used to construct `dispatch_detail.dispatchDateTime` together with `dispatch_time`.
        dispatch_time:
          type: string
          nullable: true
          description: Public alias used to construct `dispatch_detail.dispatchDateTime` together with `dispatch_date`.
        vehicle_number:
          type: string
          nullable: true
          maxLength: 50
          description: Public alias for `dispatch_detail.vehicleNumber`.
        move_purpose:
          type: integer
          nullable: true
          description: Public alias for `dispatch_detail.movePurpose`.
        other_move_purpose_title:
          type: string
          nullable: true
          maxLength: 255
          description: Public alias for `dispatch_detail.otherMovePurposeTitle`.
        items:
          type: array
          items:
            type: object
            additionalProperties: false
            properties:
              product_id:
                type: integer
                nullable: true
              description:
                type: string
                nullable: true
              quantity:
                type: number
                minimum: 0.001
                required: true
              measure_unit:
                type: string
                nullable: true
                maxLength: 255
              measurement_unit_id:
                type: integer
                nullable: true
              unit_price:
                type: number
                nullable: true
                minimum: 0
              discount_percentage:
                type: number
                nullable: true
                minimum: 0
                maximum: 100
              taxes:
                type: array
                nullable: true
                items:
                  type: integer
              mydata_classification_category:
                type: string
                nullable: true
                maxLength: 255
              mydata_classification_type:
                type: string
                nullable: true
                maxLength: 255
              vat_exemption_category:
                type: integer
                nullable: true
        taxes:
          type: array
          nullable: true
          items:
            type: integer
        payment_methods:
          type: array
          nullable: true
          description: Required when `payment_way` is `cash`; otherwise prohibited.
          items:
            type: object
            additionalProperties: false
            properties:
              paymentMethod:
                type: integer
                enum:
                  - 1
                  - 2
                  - 3
                  - 4
                  - 6
                  - 7
                  - 8
                description: |
                  Available only when myDATA integration is enabled.

                  Values:
                  - 1: Domestic Payments Account
                  - 2: Foreign Payments Account
                  - 3: Cash
                  - 4: Cheque
                  - 6: Web Banking
                  - 7: POS / e-POS
                  - 8: IRIS Direct Payment
              paymentAmount:
                type: number
                minimum: 0
              terminal_id:
                type: integer
                nullable: true
                description: terminal_id from CBO (terminals table). Only available when paymentMethod is 7 (POS / e-POS).
              tip:
                type: number
                nullable: true
                description: Tip amount. Only available when paymentMethod is 7 (POS / e-POS).
              instalments:
                type: integer
                nullable: true
                minimum: 0
                description: Number of instalments. Only available when paymentMethod is 7 (POS / e-POS).
              paymentMethodInfo:
                type: string
                nullable: true
                maxLength: 255
        related_documents:
          type: array
          nullable: true
          items:
            type: integer
            description: id of invoice with document_type `credit-invoice`
        delivery_notes:
          type: array
          nullable: true
          items:
            type: integer
            description: id of invoice with document_type `delivery-note`
        terms:
          type: string
          nullable: true
          maxLength: 1000
        notes:
          type: string
          nullable: true
          maxLength: 1000
        payment_way:
          type: string
          nullable: true
          enum:
            - cash
            - on-credit
        currency_code:
          type: string
          nullable: true
          maxLength: 3
        isDraft:
          type: boolean
          nullable: true
        mydata_submit:
          type: boolean
          nullable: true
      required:
        - invoice_type_id
        - date
        - client_id
        - document_type
        - billing_address
    InvoiceSingleResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          $ref: '#/components/schemas/Invoice'
      required:
        - success
        - data
    ValidationError:
      type: object
      additionalProperties: false
      properties:
        message:
          type: string
          example: The given data was invalid.
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
          example:
            name:
              - The name field is required.
      required:
        - message
        - errors
    InvoicePublishRequest:
      type: object
      additionalProperties: false
      description: |
        Optional flags for publishing a draft invoice. When the invoice is already in `Executed` status, set `mydata_submit` to true to allow re-submission flows.
      properties:
        instant_receipt:
          type: boolean
          default: true
          description: Whether to issue instant receipt behaviour (backend default true).
          example: true
        mydata_submit:
          type: boolean
          default: false
          description: |
            When true, allows processing even if the invoice is already published (`Executed`). If status is `Executed` and this is false, the API returns 422 "Invoice is already published."
    FailureMessageResponse:
      type: object
      additionalProperties: false
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: Operation failed.
      required:
        - success
        - message
    InvoiceEmailRequest:
      type: object
      additionalProperties: false
      properties:
        to:
          type: string
          format: email
          example: client@example.com
        store_email:
          type: boolean
          nullable: true
          default: false
          example: true
      required:
        - to
    InvoiceEmailResponse:
      type: object
      additionalProperties: false
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Email sent successfully
      required:
        - success
        - message
    Characteristic:
