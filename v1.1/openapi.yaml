          type: integer
          nullable: true
          minimum: 0
          example: 3
        payment_timeout:
          type: integer
          nullable: true
          minimum: 0
          description: Time in seconds. Use 65535 for unlimited.
          example: 65535
        description:
          type: string
          nullable: true
          maxLength: 1000
          example: 'Invoice #55 payment'
      required:
        - gateway_id
        - amount
