        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: Not found (unknown id or not in company scope)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FailureMessageResponse'
              examples:
                notFound:
                  value:
                    success: false
                    message: Invoice type not found
        '409':
          description: Conflict — cannot delete (related invoices, supplier invoices, or branch links)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FailureMessageResponse'
              examples:
                conflict:
                  value:
                    success: false
                    message: Invoice type cannot be deleted because it has related invoices, supplier invoices, or branch links.
        '422':
          description: Cannot delete default document type for this category
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FailureMessageResponse'
              examples:
                defaultType:
                  value:
                    success: false
                    message: Cannot delete the default document type for this category.
