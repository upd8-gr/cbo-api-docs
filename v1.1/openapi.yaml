openapi: 3.0.3
info:
  title: CBO API v1.1
  version: '1.1'
  x-logo:
    url: ../assets/logo.png
    altText: Upd8.gr
  description: |
    CBO (Cloud Business Organiser) is a business management platform designed for Greek-market commercial operations.

    The CBO API provides secure, authenticated access to the core entities of the platform, allowing you to
    programmatically manage organisational data, commercial documents, and operational workflows.

    With the API you can:
    - Integrate external applications to automate business processes and synchronize data.
    - Connect your e-shop to CBO to manage products, orders, customers, and stock centrally.
    - Use CBO as your billing system, fully supporting AADE/MyData requirements and digital document circulation flows where applicable.

    All endpoints are company-scoped and require Bearer authentication.
    Responses follow consistent validation and pagination standards across the platform.

    ---

    ## Authentication

    All API requests must include a **Bearer token** in the `Authorization` header.

    **Example:**
    ```
    Authorization: Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
    ```

    Obtain your token from your Profile page through the app [CBO](https://app.cbo.gr). 

    ---

    ## Authorisation

    Every request must include the company context via the **X-Asseblo-Company** header with the company ID.

    **Example:**
    ```
    X-Asseblo-Company: 123123123123
    ```

    Use the company ID that corresponds to the tenant you are acting on behalf of.

    ---

    ## Rate limits

    | Limit | Value |
    |-------|--------|
    | Per day | 1000 API calls |
    | Per minute | 60 requests |

    When a limit is exceeded, the API returns **HTTP 429 Too Many Requests**.
servers:
  - url: https://app.cbo.gr/api/v1.1
    description: CBO production
  - url: https://app.excelon.gr/api/v1.1
    description: CBO staging environment
security:
  - BearerAuth: []
  - XAssebloCompany: []
tags:
  - name: Invoices
  - name: Clients
  - name: Suppliers
  - name: Taxes
  - name: Invoice Types
  - name: Invoice Series
  - name: Product Children
  - name: Measurement Units
  - name: Expense Categories
  - name: Tax Offices
  - name: Payment Links
  - name: Countries
paths:
  /invoices:
    get:
      tags:
        - Invoices
      summary: Invoices (list)
      description: |
        Lists invoices with optional search and filtering.
        Response is paginated and wrapped as {success,data,meta}.
      security:
        - BearerAuth: []
      parameters:
        - name: search
          in: query
          required: false
          schema:
            type: string
          example: INV-2026
        - name: search_fields
          in: query
          required: false
          description: Comma-separated searchable fields.
          schema:
            type: string
          example: serial_number,nickname
        - name: serial_number
          in: query
          required: false
          schema:
            type: integer
        - name: date_from
          in: query
          required: false
          schema:
            type: string
            format: date
        - name: date_to
          in: query
          required: false
          schema:
            type: string
            format: date
        - name: status
          in: query
          required: false
          style: form
          explode: true
          schema:
            oneOf:
              - type: string
              - type: array
                items:
                  type: string
        - name: document_type
          in: query
          required: false
          style: form
          explode: true
          schema:
            oneOf:
              - type: string
              - type: array
                items:
                  type: string
        - name: client_id
          in: query
          required: false
          schema:
            type: integer
        - name: invoice_type_id
          in: query
          required: false
          description: invoice_type_id
          schema:
            type: integer
        - name: invoice_series_id
          in: query
          required: false
          schema:
            type: integer
        - name: sort_by
          in: query
          required: false
          schema:
            type: string
            enum:
              - payment_date
              - serial_number
              - status
              - created_at
          example: payment_date
        - name: sort_order
          in: query
          required: false
          schema:
            type: string
            enum:
              - asc
              - desc
          example: desc
        - name: page
          in: query
          schema:
            type: integer
        - name: page_size
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvoiceIndexResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags:
        - Invoices
      summary: Invoice (create)
      description: |
        Creates a new invoice.
        Response is wrapped as {success,data}.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InvoiceStore'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvoiceSingleResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
  /invoices/{id}:
    get:
      tags:
        - Invoices
      summary: Invoice (show)
      description: |
        Shows an invoice by its ID.
        Response is wrapped as {success,data}.
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvoiceSingleResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /invoices/{id}/publish:
    post:
      tags:
        - Invoices
      summary: Publish draft invoice
      description: |
        Publishes a draft client invoice (`POST /api/v1.1/invoices/{id}/publish`).
        Loads the invoice with items, taxes, client, type, series, dispatch and payment methods, then runs the publish service.

        - If status is already `Executed` and `mydata_submit` is **false**, returns **422** with "Invoice is already published."
        - On validation or business errors after commit checks, may return **422** with the first alert message.
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InvoicePublishRequest'
            examples:
              default:
                value:
                  instant_receipt: true
                  mydata_submit: false
      responses:
        '200':
          description: Published — returns updated invoice resource
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvoiceSingleResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: Validation error, already published, or publish blocked by business rules
          content:
            application/json:
              oneOf:
                - $ref: ../../../_shared/components/schemas/errors/ValidationError.yaml
                - $ref: ../../components/schemas/common/FailureMessageResponse.yaml
              examples:
                alreadyPublished:
                  value:
                    success: false
                    message: Invoice is already published.
                alertError:
                  value:
                    success: false
                    message: First error message from alerts.
        '500':
          description: Server error (unexpected failure during transaction)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FailureMessageResponse'
  /invoices/{id}/email:
    post:
      tags:
        - Invoices
      summary: Send email invoice
      description: |
        Sends the invoice (or offer, if document_type=estimate-offer) to the given email. Optionally stores the email in client's contact details.
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InvoiceEmailRequest'
            examples:
              default:
                value:
                  to: client@example.com
                  store_email: true
      responses:
        '200':
          description: Email sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvoiceEmailResponse'
              examples:
                success:
                  value:
                    success: true
                    message: Email sent successfully
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
  /product-children:
    get:
      tags:
        - Product Children
      summary: Product children (list)
      description: |
        Lists product children for the company from `X-Asseblo-Company`. Supports search on
        `product_name`, `catalog_code`, `barcode`, `erp_code`; optional filters `group_id` and `visibility`;
        sorting and pagination (`page_size` default 50, max 100). If `stock` is provided, each returned
        item exposes partial stock output instead of the default full stock output.
        Response: `{ success, data[], meta }`.
      security:
        - BearerAuth: []
      parameters:
        - name: search
          in: query
          required: false
          schema:
            type: string
          description: Search across product name, catalog code, barcode, ERP code.
        - name: group_id
          in: query
          required: false
          schema:
            type: integer
        - name: visibility
          in: query
          required: false
          description: Filter by visibility flag (0/1).
          schema:
            type: boolean
        - name: sort_by
          in: query
          required: false
          schema:
            type: string
            enum:
              - id
              - product_name
              - catalog_code
              - primary_id
              - sell_price
              - created_at
              - updated_at
          example: id
        - name: sort_order
          in: query
          required: false
          schema:
            type: string
            enum:
              - asc
              - desc
          example: asc
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: page_size
          in: query
          required: false
          description: Page size (default 50, max 100).
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
        - name: stock
          in: query
          required: false
          description: Backend-defined stock selector used to return partial stock values per item.
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductChildIndexResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags:
        - Product Children
      summary: Product child (create)
      description: |
        Creates a product child for the company. On validation/runtime errors from the store service,
        returns **422**. Validation errors use the framework validation payload; business/runtime errors from
        the store service return `{ success: false, message }`. On unexpected failure, **500** with message.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductChildStore'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductChildSingleResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          description: Validation or business error from store service
          content:
            application/json:
              oneOf:
                - $ref: ../../../_shared/components/schemas/errors/ValidationError.yaml
                - $ref: ../../components/schemas/common/FailureMessageResponse.yaml
        '500':
          description: Unexpected error while creating product
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FailureMessageResponse'
              examples:
                server:
                  value:
                    success: false
                    message: 'Failed to create product: ...'
  /product-children/{id}:
    get:
      tags:
        - Product Children
      summary: Product child (show)
      description: Returns one product child for the company or 404 if not found / out of scope.
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductChildSingleResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FailureMessageResponse'
              examples:
                notFound:
                  value:
                    success: false
                    message: Product not found
    put:
      tags:
        - Product Children
      summary: Product child (update full)
      description: |
        Updates a product child for the company. Validation failures from the form request return **422**.
        Application exceptions inside the update service return **500** with `{ success: false, message }`.
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductChildUpdate'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductChildSingleResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FailureMessageResponse'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '500':
          description: Update failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FailureMessageResponse'
              examples:
                fail:
                  value:
                    success: false
                    message: 'Failed to update product: ...'
    patch:
      tags:
        - Product Children
      summary: Product child (update partial)
      description: |
        Partially updates a product child for the company. Validation failures from the form request return
        **422**. Application exceptions inside the update service return **500** with
        `{ success: false, message }`.
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductChildUpdate'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductChildSingleResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FailureMessageResponse'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '500':
          description: Update failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FailureMessageResponse'
    delete:
      tags:
        - Product Children
      summary: Product child (delete)
      description: |
        Deletes a product if it has no blocking relations (orders, invoices, price items, etc.).
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessageResponse'
              examples:
                deleted:
                  value:
                    success: true
                    message: Product deleted.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FailureMessageResponse'
        '409':
          description: Conflict — related records prevent deletion
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FailureMessageResponse'
              examples:
                conflict:
                  value:
                    success: false
                    message: Product cannot be deleted because it has related records (orders, invoices, price items, etc.).
  /measurement-units:
    get:
      tags:
        - Measurement Units
      summary: Measurement units (list)
      description: |
        Lists measurement units for the company from `X-Asseblo-Company`.
        Supports free-text search across `name`, `short_name`, `peppol`, optional category filtering,
        sorting, and pagination. Response is wrapped as `{ success, data, meta }`.
      security:
        - BearerAuth: []
      parameters:
        - name: search
          in: query
          required: false
          description: Search value used with SQL `LIKE`.
          schema:
            type: string
        - name: search_fields
          in: query
          required: false
          description: Comma-separated subset of `name`, `short_name`, `peppol`. Invalid fields are ignored.
          schema:
            type: string
          example: name,short_name
        - name: category
          in: query
          required: false
          description: Single category or repeated array values. English and Greek aliases are normalized by the backend.
          style: form
          explode: true
          schema:
            oneOf:
              - type: string
              - type: array
                items:
                  type: string
          examples:
            single:
              value: general
            multiple:
              value:
                - general
                - βάρος
        - name: sort_by
          in: query
          required: false
          schema:
            type: string
            enum:
              - id
              - name
              - short_name
              - type
              - category
              - created_at
              - updated_at
          example: id
        - name: sort_order
          in: query
          required: false
          schema:
            type: string
            enum:
              - asc
              - desc
          example: asc
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: page_size
          in: query
          required: false
          description: Page size (default 50, max 100).
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeasurementUnitIndexResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags:
        - Measurement Units
      summary: Measurement unit (create)
      description: |
        Creates a measurement unit for the company. Validation failures return **422** with the standard
        validation payload.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MeasurementUnitStore'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeasurementUnitSingleResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
  /measurement-units/{id}:
    get:
      tags:
        - Measurement Units
      summary: Measurement unit (show)
      description: Returns one measurement unit for the company or 404 if not found / out of scope.
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeasurementUnitSingleResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FailureMessageResponse'
              examples:
                notFound:
                  value:
                    success: false
                    message: Measurement unit not found
    put:
      tags:
        - Measurement Units
      summary: Measurement unit (update full)
      description: |
        Updates a measurement unit for the company. Validation failures return **422** with the standard
        validation payload.
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MeasurementUnitUpdate'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeasurementUnitSingleResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FailureMessageResponse'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
    patch:
      tags:
        - Measurement Units
      summary: Measurement unit (update partial)
      description: |
        Partially updates a measurement unit for the company. Validation failures return **422** with the
        standard validation payload.
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MeasurementUnitUpdate'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeasurementUnitSingleResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FailureMessageResponse'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
    delete:
      tags:
        - Measurement Units
      summary: Measurement unit (delete)
      description: Deletes a measurement unit if it has no blocking relations.
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessageResponse'
              examples:
                deleted:
                  value:
                    success: true
                    message: Measurement unit deleted.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FailureMessageResponse'
              examples:
                notFound:
                  value:
                    success: false
                    message: Measurement unit not found
        '422':
          description: Delete blocked by related records
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FailureMessageResponse'
              examples:
                blocked:
                  value:
                    success: false
                    message: Measurement unit cannot be deleted because it has related records.
  /clients:
    get:
      tags:
        - Clients
      summary: Clients (list)
      description: |
        Lists clients (isSeller=false) with optional search and client_type filtering. Response is paginated and wrapped as {success,data,meta}.
      security:
        - BearerAuth: []
      parameters:
        - name: search
          in: query
          required: false
          description: Search term (used only when search_fields is present).
          schema:
            type: string
          example: Papad
        - name: search_fields
          in: query
          required: false
          description: Comma-separated fields used in OR LIKE search. The available fields are `first_name`, `last_name`, `vat`, `email`, `invoice_name`, `company_name`, `tax_office`, `profession`, `client_type`.
          schema:
            type: string
          example: fname,lname,vat,email
        - name: client_type
          in: query
          required: false
          description: Filter by client type(s). Type 1 is company (B2B), type 2 is person (B2C).
          style: form
          explode: true
          schema:
            oneOf:
              - type: integer
                enum:
                  - 1
                  - 2
              - type: array
                items:
                  type: integer
                  enum:
                    - 1
                    - 2
          examples:
            single:
              value: 1
