  /payment-links:
    get:
      tags:
        - Payment Links
      summary: List payment links
      description: Paginated list of payment links for the company.
      security:
        - BearerAuth: []
      parameters:
        - name: status
          in: query
          required: false
          description: Filter by status (string or array).
          style: form
          explode: true
          schema:
            oneOf:
              - type: string
              - type: array
                items:
                  type: string
          example:
            - pending
            - paid
        - name: sort_by
          in: query
          required: false
          schema:
            type: string
            default: id
          example: id
        - name: sort_order
          in: query
          required: false
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
          example: desc
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: page_size
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentLinkIndexResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags:
        - Payment Links
      summary: Create payment link
      description: Creates a payment order and returns the hosted payment URL.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentLinkStoreRequest'
            examples:
              invoice:
                value:
                  gateway_id: 1
                  amount: 120.5
                  billable_type: invoice
                  billable_id: 55
                  exact_amount: true
                  max_installments: 3
                  payment_timeout: 65535
                  description: 'Invoice #55 payment'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentLinkSingleResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
  /payment-links/{id}:
    get:
      tags:
        - Payment Links
      summary: Show payment link
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentLinkSingleResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /payment-links/{id}/cancel:
    post:
      tags:
        - Payment Links
      summary: Cancel payment link
      description: Cancels a payment order (cannot cancel if already paid).
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Canceled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentLinkCancelResponse'
              examples:
                success:
                  value:
                    success: true
                    message: Payment link canceled.
                    data:
                      id: 10
                      status: canceled
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: Cannot cancel (e.g. already paid)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentLinkErrorResponse'
              examples:
                paid:
                  value:
                    success: false
                    message: Cannot cancel a paid payment link.
