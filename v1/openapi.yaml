openapi: 3.0.3
info:
  title: CBO API v1
  version: '1.0'
  x-logo:
    url: ../assets/logo.png
    altText: Upd8.gr
  description: |
    CBO (Cloud Business Organiser) is a business management platform designed for Greek-market commercial operations.

    The CBO API provides secure, authenticated access to the core entities of the platform, allowing you to
    programmatically manage organisational data, commercial documents, and operational workflows.

    With the API you can:
    - Integrate external applications to automate business processes and synchronize data.
    - Connect your e-shop to CBO to manage products, orders, customers, and stock centrally.
    - Use CBO as your billing system, fully supporting AADE/MyData requirements and digital document circulation flows where applicable.

    All endpoints are company-scoped and require Bearer authentication.
    Responses follow consistent validation and pagination standards across the platform.


    ## Authentication

    All API requests must include a **Bearer token** in the `Authorization` header.

    **Example:**
    ```
    Authorization: Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
    ```

    Obtain your token via the login endpoint or from [CBO](https://app.cbo.gr).

    ---

    ## Authorisation

    Every request must include the company context via the **X-Asseblo-Company** header with the company ID.

    **Example:**
    ```
    X-Asseblo-Company: 123123123123
    ```

    Use the company ID that corresponds to the tenant you are acting on behalf of.

    ---

    ## Rate limits

    | Limit | Value |
    |-------|--------|
    | Per day | 1000 API calls |
    | Per minute | 60 requests |

    When a limit is exceeded, the API returns **HTTP 429 Too Many Requests**.
servers:
  - url: https://app.cbo.gr/api/v1
    description: CBO production
security:
  - BearerAuth: []
  - XAssebloCompany: []
tags:
  - name: Products Children
  - name: Groups
  - name: Characteristics
  - name: Stocks
  - name: Orders
paths:
  /products-children:
    get:
      tags:
        - Products Children
      summary: List product children
      description: |
        Returns product children. Supports filters by ids, group, characteristics and ordering. Returns Laravel paginated response using `page_size` (default 100).
      security:
        - BearerAuth: []
      parameters:
        - name: fromWebsite
          in: query
          required: false
          description: Filter by visibility on website (showOnWebsite).
          schema:
            type: boolean
            default: true
          example: true
        - name: getGroupHierarchy
          in: query
          required: false
          description: If true, includes group hierarchy info in the resource.
          schema:
            type: boolean
            default: false
          example: false
        - name: ids
          in: query
          required: false
          description: Filter by specific product child IDs.
          style: form
          explode: true
          schema:
            type: array
            items:
              type: integer
              format: int64
          example:
            - 10
            - 20
            - 30
        - name: group_id
          in: query
          required: false
          description: Filter by group id.
          schema:
            type: integer
            format: int64
          example: 5
        - name: characteristics_id
          in: query
          required: false
          description: Filter products that have ALL of the given characteristic ids.
          style: form
          explode: true
          schema:
            type: array
            items:
              type: integer
              format: int64
          example:
            - 2
            - 7
        - name: ordering
          in: query
          required: false
          description: Ordering string handled by backend `ordering()` helper.
          schema:
            type: string
          example: retail_price:asc
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
          example: 1
        - name: page_size
          in: query
          required: false
          description: Page size for Laravel pagination (default 100). `all` is intentionally not documented.
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 100
          example: 100
        - name: stock
          in: query
          required: false
          description: If provided, resource returns partial stock by the given value (backend-defined).
          schema:
            type: string
          example: warehouse:1
      responses:
        '200':
          description: Paginated list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductChildPaginatedCollection'
              examples:
                paginated:
                  value:
                    data:
                      - id: 10
                        title: Product Child A
                        description: null
                        image:
                          thumb: null
                          normal: null
                        measurment: Τεμάχιο
                        cost: 10
                        sell_price: 15
                        website_price: 15
                        retail_price: 20
                        discounted_price: 0
                        builded_price: 0
                        tax: 24
                        stock: 5
                        barcode: '5200000000000'
                        catalog_code: CAT-01
                        erp_code: ERP-01
                        product_id: 100
                        group_id: 5
                        parent_name: Parent Product
                        company: 1
                        created: '2026-02-11 10:00:00'
                        updated: '2026-02-11 10:00:00'
                        characteristicsHtml: <span>...</span>
                        characteristics: []
                        tiers: []
                        catalogues: []
                    links:
                      first: /api/v1/products-children?page=1
                      last: /api/v1/products-children?page=10
                      prev: null
                      next: /api/v1/products-children?page=2
                    meta:
                      current_page: 1
                      from: 1
                      last_page: 10
                      path: /api/v1/products-children
                      per_page: 100
                      to: 100
                      total: 1000
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /products-children/{id}:
    get:
      tags:
        - Products Children
      summary: Show product child
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdPath'
        - name: stock
          in: query
          required: false
          description: If provided, resource returns partial stock by the given value (backend-defined).
          schema:
            type: string
          example: warehouse:1
        - name: getGroupHierarchy
          in: query
          required: false
          description: If true, includes group hierarchy info in the resource.
          schema:
            type: boolean
            default: false
          example: false
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductChild'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /groups:
    get:
      tags:
        - Groups
      summary: List groups (categories)
      description: |
        Returns groups with optional filtering, tree relations, products, prices, stock flags and characteristics. If `page_size` is provided, response is Laravel paginated. Otherwise returns a plain resource collection.
      security:
        - BearerAuth: []
      parameters:
        - name: ids
          in: query
          required: false
          description: Filter by specific group IDs.
          style: form
          explode: true
          schema:
            type: array
            items:
              type: integer
              format: int64
          example:
            - 1
            - 2
            - 3
        - name: temp_id
          in: query
          required: false
          description: Filter by temporary_id list.
          style: form
          explode: true
          schema:
            type: array
            items:
              type: integer
          example:
            - 101
            - 102
        - name: parent
          in: query
          required: false
          description: Filter by parent group id (group_id).
          schema:
            type: integer
            format: int64
          example: 10
        - name: search
          in: query
          required: false
          description: Search by group name (LIKE %...%).
          schema:
            type: string
          example: laptops
        - name: platform
          in: query
          required: false
          description: Filter groups that have products visible in the selected platform.
          schema:
            type: string
            enum:
              - web
              - b2b
          example: web
        - name: withProducts
          in: query
          required: false
          description: Load `products` relation filtered by platform.
          schema:
            type: boolean
          example: true
        - name: withAllProducts
          in: query
          required: false
          description: Load products of group + descendants (recursiveProducts).
          schema:
            type: boolean
          example: false
        - name: withProductEagers
          in: query
          required: false
          description: If false, products eager loads are cleared (setEagerLoads([])).
          schema:
            type: boolean
            default: true
          example: true
        - name: withProductColumns
          in: query
          required: false
          description: Comma-separated columns to select on product children (id, group_id, company_id are always added).
          schema:
            type: string
          example: id,product_name,barcode,retail_price
        - name: withMinPrice
          in: query
          required: false
          description: Adds `retail_price` (min retail_price in products for this group).
          schema:
            type: boolean
          example: true
        - name: withMinDiscounted
          in: query
          required: false
          description: Adds `discounted_price` (min discounted_price in products where discounted_price != 0).
          schema:
            type: boolean
          example: false
        - name: withMinWebPrice
          in: query
          required: false
          description: Adds `website_price` (min website_price in products where website_price != 0).
          schema:
            type: boolean
          example: false
        - name: withTotalStock
          in: query
          required: false
          description: Adds `has_stocks` flag for group (and for children in show endpoint).
          schema:
            type: boolean
          example: false
        - name: withHasProducts
          in: query
          required: false
          description: Adds `hasProducts` boolean (exists products for platform).
          schema:
            type: boolean
          example: true
        - name: withHasChildren
          in: query
          required: false
          description: Adds `hasChildren` boolean (exists group children, optionally platform-aware).
          schema:
            type: boolean
          example: true
        - name: withOrder
          in: query
          required: false
          description: Order by column (default deep then sort).
          schema:
            type: string
            enum:
              - id
              - name
              - deep
              - sort
              - created_at
              - updated_at
          example: sort
        - name: onlyRoots
          in: query
          required: false
          description: Return only root groups.
          schema:
            type: boolean
          example: false
        - name: onlyLeaves
          in: query
          required: false
          description: Return only leaf groups.
          schema:
            type: boolean
          example: false
        - name: withParent
          in: query
          required: false
          description: Include immediate parent object.
          schema:
            type: boolean
          example: true
        - name: withChildren
          in: query
          required: false
          description: Include immediate children (`children`).
          schema:
            type: boolean
          example: true
        - name: withAncestors
          in: query
          required: false
          description: Include parent chain up to root (uses group_parent + group_ancestors).
          schema:
            type: boolean
          example: false
        - name: withDescendants
          in: query
          required: false
          description: Include descendants (custom descendants() scope/loader).
          schema:
            type: boolean
          example: false
        - name: deep
          in: query
          required: false
          description: Filter by depth.
          schema:
            type: integer
          example: 2
        - name: page_size
          in: query
          required: false
          description: If provided, response becomes Laravel paginated with that per-page size.
          schema:
            type: integer
            minimum: 1
            maximum: 500
          example: 50
      responses:
        '200':
          description: OK (collection or paginated collection)
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/GroupCollection'
                  - $ref: '#/components/schemas/GroupPaginatedCollection'
              examples:
                collection:
                  summary: Non-paginated
                  value:
                    data:
                      - id: 1
                        title: Group A
                        slug: group-a
                        description: null
                        deep: 0
                        images: ''
                        parent_id: null
                        temp_id: null
                        company: 1
                        created: '2026-02-11 10:00:00'
                        updated: '2026-02-11 10:00:00'
                        child: []
                paginated:
                  summary: Paginated (page_size)
                  value:
                    data:
                      - id: 1
                        title: Group A
                        slug: group-a
                        description: null
                        deep: 0
                        images: ''
                        parent_id: null
                        temp_id: null
                        company: 1
                        created: '2026-02-11 10:00:00'
                        updated: '2026-02-11 10:00:00'
                        child: []
                    links:
                      first: /api/v1/groups?page=1
                      last: /api/v1/groups?page=10
                      prev: null
                      next: /api/v1/groups?page=2
                    meta:
                      current_page: 1
                      from: 1
                      last_page: 10
                      path: /api/v1/groups
                      per_page: 50
                      to: 50
                      total: 500
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /groups/{id}:
    get:
      tags:
        - Groups
      summary: Show group (category)
      description: |
        Returns a single group. Supports loading products, recursive products, min price fields, stock flags, children existence flags and characteristics grouping.
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdPath'
        - name: platform
          in: query
          required: false
          schema:
            type: string
            enum:
              - web
              - b2b
          example: web
        - name: withProducts
          in: query
          required: false
          schema:
            type: boolean
          example: true
        - name: withAllProducts
          in: query
          required: false
          schema:
            type: boolean
          example: false
        - name: withProductEagers
          in: query
          required: false
          schema:
            type: boolean
            default: true
          example: true
        - name: withProductColumns
          in: query
          required: false
          schema:
            type: string
          example: id,product_name,barcode,retail_price
        - name: withMinPrice
          in: query
          required: false
          schema:
            type: boolean
          example: true
        - name: withMinDiscounted
          in: query
          required: false
          schema:
            type: boolean
          example: false
        - name: withMinWebPrice
          in: query
          required: false
          schema:
            type: boolean
          example: false
        - name: withTotalStock
          in: query
          required: false
          schema:
            type: boolean
          example: false
        - name: withHasProducts
          in: query
          required: false
          schema:
            type: boolean
          example: true
        - name: withHasChildren
          in: query
          required: false
          schema:
            type: boolean
          example: true
        - name: showCharacteristics
          in: query
          required: false
          description: If true, returns `characteristics` grouped by category.
          schema:
            type: boolean
            default: true
          example: true
        - name: characteristic_category
          in: query
          required: false
          description: Filter shown characteristics by char_category_id.
          schema:
            type: integer
            format: int64
          example: 2
        - name: withParent
          in: query
          required: false
          schema:
            type: boolean
          example: true
        - name: withChildren
          in: query
          required: false
          schema:
            type: boolean
          example: true
        - name: withAncestors
          in: query
          required: false
          schema:
            type: boolean
          example: false
        - name: withDescendants
          in: query
          required: false
          schema:
            type: boolean
          example: false
        - name: withOrder
          in: query
          required: false
          schema:
            type: string
            enum:
              - id
              - name
              - deep
              - sort
              - created_at
              - updated_at
          example: sort
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupResponse'
              examples:
                default:
                  value:
                    id: 1
                    title: Group A
                    slug: group-a
                    description: null
                    deep: 0
                    images: ''
                    parent_id: null
                    temp_id: null
                    company: 1
                    created: '2026-02-11 10:00:00'
                    updated: '2026-02-11 10:00:00'
                    child: []
                    retail_price: 100
                    hasProducts: true
                    hasChildren: false
                    products: []
                    characteristics: []
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /characteristics:
    get:
      tags:
        - Characteristics
      summary: List characteristics
      description: |
        Returns characteristics with optional filtering by category, group, and specific IDs. If `page_size` is provided, response is Laravel paginated. Otherwise returns a plain resource collection.
      security:
        - BearerAuth: []
      parameters:
        - name: needle_category
          in: query
          required: false
          description: Filter characteristics by category ID.
          schema:
            type: integer
            format: int64
          example: 3
        - name: group_id
          in: query
          required: false
          description: Filter characteristics linked to a specific group.
          schema:
            type: integer
            format: int64
          example: 5
        - name: characteristic_id
          in: query
          required: false
          description: Filter by a specific characteristic ID.
          schema:
            type: integer
            format: int64
          example: 12
        - name: fromWebsite
          in: query
          required: false
          description: Filter by website visibility.
          schema:
            type: boolean
            default: true
          example: true
        - name: checkStock
          in: query
          required: false
          description: Whether to check stock availability when filtering.
          schema:
            type: boolean
          example: false
        - name: ordering
          in: query
          required: false
          description: |
            Ordering string. Prefix column name with `-` for descending order. Multiple columns separated by comma.
          schema:
            type: string
          example: id,-name
        - name: page_size
          in: query
          required: false
          description: |
            Page size for Laravel pagination. Use an integer for a fixed page size, or `"all"` to return all records unpaginated.
          schema:
            oneOf:
              - type: integer
                minimum: 1
              - type: string
                enum:
                  - all
          example: 100
      responses:
        '200':
          description: OK (collection or paginated collection)
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/CharacteristicCollection'
                  - $ref: '#/components/schemas/CharacteristicPaginatedCollection'
              examples:
                collection:
                  summary: Non-paginated
                  value:
                    data:
                      - id: 1
                        name: Red
                        image: null
                        category:
                          id: 1
                          name: Color
                          characteristics:
                            - id: 1
                              name: Red
                              image: null
                paginated:
                  summary: Paginated (page_size provided)
                  value:
                    data:
                      - id: 1
                        name: Red
                        image: null
                        category:
                          id: 1
                          name: Color
                          characteristics:
                            - id: 1
                              name: Red
                              image: null
                    links:
                      first: /api/v1/characteristics?page=1
                      last: /api/v1/characteristics?page=5
                      prev: null
                      next: /api/v1/characteristics?page=2
                    meta:
                      current_page: 1
                      from: 1
                      last_page: 5
                      path: /api/v1/characteristics
                      per_page: 100
                      to: 100
                      total: 500
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /characteristics/{characteristic}:
    get:
      tags:
        - Characteristics
      summary: Show characteristic
      description: Returns a single characteristic by ID.
      security:
        - BearerAuth: []
      parameters:
        - name: characteristic
          in: path
          required: true
          description: The ID of the characteristic.
          schema:
            type: integer
            format: int64
          example: 1
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CharacteristicResponse'
              example:
                data:
                  id: 1
                  name: Red
                  image: null
                  category:
                    id: 1
                    name: Color
                    characteristics:
                      - id: 1
                        name: Red
                        image: null
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /characteristics-categories:
    get:
      tags:
        - Characteristics
      summary: List characteristic categories
      description: |
        Returns characteristic categories (each with its slim-characteristics list). If `page_size` is provided, response is Laravel paginated. Otherwise returns a plain resource collection.
      security:
        - BearerAuth: []
      parameters:
        - name: page_size
          in: query
          required: false
          description: |
            Page size for Laravel pagination. Use an integer for a fixed page size, or `"all"` to return all records unpaginated.
          schema:
            oneOf:
              - type: integer
                minimum: 1
              - type: string
                enum:
                  - all
          example: 100
      responses:
        '200':
          description: OK (collection or paginated collection)
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/CharacteristicCategoryCollection'
                  - $ref: '#/components/schemas/CharacteristicCategoryPaginatedCollection'
              examples:
                collection:
                  summary: Non-paginated
                  value:
                    data:
                      - id: 1
                        name: Color
                        characteristics:
                          - id: 1
                            name: Red
                            image: null
                paginated:
                  summary: Paginated (page_size provided)
                  value:
                    data:
                      - id: 1
                        name: Color
                        characteristics:
                          - id: 1
                            name: Red
                            image: null
                    links:
                      first: /api/v1/characteristics-categories?page=1
                      last: /api/v1/characteristics-categories?page=3
                      prev: null
                      next: /api/v1/characteristics-categories?page=2
                    meta:
                      current_page: 1
                      from: 1
                      last_page: 3
                      path: /api/v1/characteristics-categories
                      per_page: 100
                      to: 100
                      total: 300
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /characteristics-categories/{category}:
    get:
      tags:
        - Characteristics
      summary: Show characteristic category
      description: Returns a single characteristic category by ID.
      security:
        - BearerAuth: []
      parameters:
        - name: category
          in: path
          required: true
          description: The ID of the characteristic category.
          schema:
            type: integer
            format: int64
          example: 1
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CharacteristicCategoryResponse'
              example:
                data:
                  id: 1
                  name: Color
                  characteristics:
                    - id: 1
                      name: Red
                      image: null
                    - id: 2
                      name: Blue
                      image: null
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /stocks:
    get:
      tags:
        - Stocks
      summary: List stocks
      description: |
        Returns warehouse/stock locations. If `page_size` is provided, response is Laravel paginated. Otherwise returns a plain resource collection.
      security:
        - BearerAuth: []
      parameters:
        - name: page_size
          in: query
          required: false
          description: |
            Page size for Laravel pagination. Use an integer for a fixed page size, or `"all"` to return all records unpaginated.
          schema:
            oneOf:
              - type: integer
                minimum: 1
              - type: string
                enum:
                  - all
          example: 100
      responses:
        '200':
          description: OK (collection or paginated collection)
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/StockCollection'
                  - $ref: '#/components/schemas/StockPaginatedCollection'
              examples:
                collection:
                  summary: Non-paginated
                  value:
                    data:
                      - id: 1
                        name: Αποθήκη Αθήνα
                      - id: 2
                        name: Αποθήκη Θεσσαλονίκη
                paginated:
                  summary: Paginated (page_size provided)
                  value:
                    data:
                      - id: 1
                        name: Αποθήκη Αθήνα
                    links:
                      first: /api/v1/stocks?page=1
                      last: /api/v1/stocks?page=1
                      prev: null
                      next: null
                    meta:
                      current_page: 1
                      from: 1
                      last_page: 1
                      path: /api/v1/stocks
                      per_page: 100
                      to: 2
                      total: 2
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /stocks/{stock}:
    get:
      tags:
        - Stocks
      summary: Show stock
      description: Returns a single stock/warehouse location by ID.
      security:
        - BearerAuth: []
      parameters:
        - name: stock
          in: path
          required: true
          description: The ID of the stock location.
          schema:
            type: integer
            format: int64
          example: 1
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StockResponse'
              example:
                data:
                  id: 1
                  name: Αποθήκη Αθήνα
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /orders:
    get:
      tags:
        - Orders
      summary: List orders
      description: |
        Returns orders with optional item loading and ordering. If `page_size` is provided, response is Laravel paginated. Otherwise returns a plain resource collection.
      security:
        - BearerAuth: []
      parameters:
        - name: withItems
          in: query
          required: false
          description: If true, each order includes its line items.
          schema:
            type: boolean
          example: true
        - name: ordering
          in: query
          required: false
          description: |
            Ordering string. Prefix column name with `-` for descending order. Multiple columns separated by comma.
          schema:
            type: string
          example: id,-created_at
        - name: page_size
          in: query
          required: false
          description: |
            Page size for Laravel pagination. Use an integer for a fixed page size, or `"all"` to return all records unpaginated.
          schema:
            oneOf:
              - type: integer
                minimum: 1
              - type: string
                enum:
                  - all
          example: 100
      responses:
        '200':
          description: OK (collection or paginated collection)
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/OrderCollection'
                  - $ref: '#/components/schemas/OrderPaginatedCollection'
              examples:
                collection:
                  summary: Non-paginated
                  value:
                    data:
                      - id: 1
                        serial_number: '#1001'
                        title: Order for Παπαδόπουλος
                        billing_account: null
                        isOffer: false
                        isExternal: true
                        items: []
                        comments: null
                        updated: '2026-04-27 10:00:00'
                        created: '2026-04-27 09:00:00'
                paginated:
                  summary: Paginated (page_size provided)
                  value:
                    data:
                      - id: 1
                        serial_number: '#1001'
                        title: Order for Παπαδόπουλος
                        billing_account: null
                        isOffer: false
                        isExternal: true
                        items: []
                        comments: null
                        updated: '2026-04-27 10:00:00'
                        created: '2026-04-27 09:00:00'
                    links:
                      first: /api/v1/orders?page=1
                      last: /api/v1/orders?page=10
                      prev: null
                      next: /api/v1/orders?page=2
                    meta:
                      current_page: 1
                      from: 1
                      last_page: 10
                      path: /api/v1/orders
                      per_page: 100
                      to: 100
                      total: 1000
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /orders/{order}:
    get:
      tags:
        - Orders
      summary: Show order
      description: Returns a single order by ID.
      security:
        - BearerAuth: []
      parameters:
        - name: order
          in: path
          required: true
          description: The ID of the order.
          schema:
            type: integer
            format: int64
          example: 1
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
              example:
                data:
                  id: 1
                  serial_number: '#1001'
                  title: Order for Παπαδόπουλος
                  billing_account: null
                  isOffer: false
                  isExternal: true
                  items: []
                  comments: null
                  updated: '2026-04-27 10:00:00'
                  created: '2026-04-27 09:00:00'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /create/order:
    post:
      tags:
        - Orders
      summary: Create order
      description: |
        Creates a new order from an external source (e.g. e-shop). Finds or creates the client by email, attaches addresses, line items, fee and shipping items.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderStore'
            example:
              email: customer@example.com
              first_name: Γιώργος
              last_name: Παπαδόπουλος
              telephone: '2100000000'
              cellphone: '6900000000'
              addresses:
                - address_type: billing
                  address: Σταδίου
                  number: '10'
                  zip: '10562'
                  city: Αθήνα
                  country: GR
                - address_type: shipping
                  address: Σταδίου
                  number: '10'
                  zip: '10562'
                  city: Αθήνα
                  country: GR
              order_items:
                - product_id: SKU-001
                  title: Laptop 15"
                  quantity: 1
                  unit_price: 500
                  total_tax: 120
              shipping_items:
                - title: Shipping
                  price: 5
                  total_tax: 1.2
              isExternal: true
      responses:
        '201':
          description: Order created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderCreateResponse'
              example:
                data:
                  id: 101
                  serial_number: '#1001'
                  title: Order for Παπαδόπουλος
                  billing_account: null
                  isOffer: false
                  isExternal: true
                  items: []
                  comments: null
                  updated: '2026-04-27 10:00:00'
                  created: '2026-04-27 10:00:00'
        '400':
          description: Bad Request — required field missing (e.g. email)
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  error:
                    type: string
                    example: Το email είναι υποχρεωτικό
                required:
                  - error
              example:
                error: Το email είναι υποχρεωτικό
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: 'Send `Authorization: Bearer {token}`'
    XAssebloCompany:
      type: apiKey
      in: header
      name: X-Asseblo-Company
      description: 'Company ID. Example value: 1234567890'
  parameters:
    IdPath:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
      example: 1
    Page:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
      example: 1
    PerPage:
      name: per_page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 15
      example: 15
  schemas:
    PaginationMeta:
      type: object
      additionalProperties: false
      properties:
        first:
          type: string
          nullable: true
          example: /api/v1/clients?page=1
        last:
          type: string
          nullable: true
          example: /api/v1/clients?page=10
        prev:
          type: string
          nullable: true
          example: null
        next:
          type: string
          nullable: true
          example: /api/v1/clients?page=2
      required:
        - first
        - last
        - prev
        - next
    ValidationError:
      type: object
      additionalProperties: false
      properties:
        message:
          type: string
          example: The given data was invalid.
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
          example:
            name:
              - The name field is required.
      required:
        - message
        - errors
    ErrorResponse:
      type: object
      additionalProperties: false
      properties:
        message:
          type: string
          example: Unauthorized.
      required:
        - message
    ProductChild:
      type: object
      additionalProperties: false
      properties:
        id:
          type: integer
          format: int64
          example: 10
        title:
          type: string
          example: Product Child A
        description:
          type: string
          nullable: true
          example: null
        image:
          type: object
          additionalProperties: false
          properties:
            thumb:
              type: string
              nullable: true
              example: null
            normal:
              type: string
              nullable: true
              example: null
          required:
            - thumb
            - normal
        measurment:
          type: string
          nullable: true
          example: Τεμάχιο
        cost:
          type: number
          nullable: true
          example: 10
        sell_price:
          type: number
          nullable: true
          example: 15
        website_price:
          type: number
          nullable: true
          example: 15
        retail_price:
          type: number
          nullable: true
          example: 20
        discounted_price:
          type: number
          nullable: true
          example: 0
        builded_price:
          type: number
          nullable: true
          example: 0
        tax:
          description: Tax value (e.g. 24) from related tax.
          type: number
          nullable: true
          example: 24
        stock:
          description: Either full stock (number/object) or partial stock depending on `stock` query param.
          nullable: true
          oneOf:
            - type: number
              example: 5
            - type: object
              additionalProperties: true
        barcode:
          type: string
          nullable: true
          example: '5200000000000'
        catalog_code:
          type: string
          nullable: true
          example: CAT-01
        erp_code:
          type: string
          nullable: true
          example: ERP-01
        product_id:
          type: integer
          format: int64
          nullable: true
          example: 100
        group_id:
          type: integer
          format: int64
          nullable: true
          example: 5
        parent_name:
          type: string
          nullable: true
          example: Parent Product
        company:
          type: integer
          format: int64
          example: 1
        created:
          type: string
          example: '2026-02-11 10:00:00'
        updated:
          type: string
          example: '2026-02-11 10:00:00'
        characteristicsHtml:
          type: string
          nullable: true
          description: HTML string generated by backend.
          example: <span>...</span>
        characteristics:
          type: array
          items:
            $ref: '#/components/schemas/Characteristic'
        tiers:
          type: array
          items:
            $ref: '#/components/schemas/Tier'
        catalogues:
          type: array
          items:
            $ref: '#/components/schemas/Catalogue'
