get:
  tags: [Characteristics]
  summary: Show characteristic category
  description: Returns a single characteristic category by ID.
  security:
    - BearerAuth: []
  parameters:
    - name: category
      in: path
      required: true
      description: The ID of the characteristic category.
      schema:
        type: integer
        format: int64
      example: 1

  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/characteristics/CharacteristicCategoryResponse.yaml
          example:
            data:
              id: 1
              name: "Color"
              characteristics:
                - id: 1
                  name: "Red"
                  image: null
                - id: 2
                  name: "Blue"
                  image: null
    "401": { $ref: ../../../_shared/components/responses/Unauthorized.yaml }
    "403": { $ref: ../../../_shared/components/responses/Forbidden.yaml }
    "404": { $ref: ../../../_shared/components/responses/NotFound.yaml }
