type: object
description: Request body for creating an order (POST /create/order).
additionalProperties: false
properties:
  # Required fields
  email:
    type: string
    format: email
    example: "customer@example.com"
  first_name:
    type: string
    example: "Γιώργος"
  last_name:
    type: string
    example: "Παπαδόπουλος"
  addresses:
    type: array
    minItems: 1
    items:
      $ref: ./AddressInput.yaml
  order_items:
    type: array
    minItems: 1
    items:
      $ref: ./OrderItemInput.yaml
  # Optional fields
  vat:
    type: string
    example: "123456789"
  invoice_name:
    type: string
    example: "ACME ΜΟΝΟΠΡΟΣΩΠΗ ΙΚΕ"
  company_name:
    type: string
    example: "ACME"
  tax_office:
    type: string
    example: "Α Αθηνών"
  profession:
    type: string
    example: "Έμπορος"
  telephone:
    type: string
    example: "2100000000"
  cellphone:
    type: string
    example: "6900000000"
  website_domain:
    type: string
    example: "acme.gr"
  order_id:
    type: integer
    description: External order ID from e-shop.
    example: 54321
  isOffer:
    type: boolean
    example: false
  isExternal:
    type: boolean
    example: true
  comments:
    type: string
    example: "Please deliver after 14:00."
  fee_items:
    type: array
    items:
      $ref: ./FeeItemInput.yaml
  shipping_items:
    type: array
    items:
      $ref: ./FeeItemInput.yaml
required: [email, first_name, last_name, addresses, order_items]
