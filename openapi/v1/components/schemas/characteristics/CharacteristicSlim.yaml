type: object
description: Slim representation of a Characteristic (no category, avoids recursion).
additionalProperties: false
properties:
  id:
    type: integer
    format: int64
    example: 1
  name:
    type: string
    example: "Red"
  image:
    type: string
    nullable: true
    example: "https://app.cbo.gr/storage/characteristics/red.jpg"
required: [id, name]
