type: object
description: Full representation of a Characteristic including its nullable category.
additionalProperties: false
properties:
  id:
    type: integer
    format: int64
    example: 1
  name:
    type: string
    example: "Red"
  image:
    type: string
    nullable: true
    example: "https://app.cbo.gr/storage/characteristics/red.jpg"
  category:
    nullable: true
    oneOf:
      - $ref: ./CharacteristicCategoryResource.yaml
required: [id, name]
