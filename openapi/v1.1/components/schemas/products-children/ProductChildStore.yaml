type: object
additionalProperties: false
description: >
  Create product child (`StoreProductChildRequest`). `group_id` may be sent as `-1` to be normalized to `0`.
  `catalogues` / `suppliers` are normalized server-side into `catalogue_rates` / `supplier_pivot`.
properties:
  product_name:
    type: string
    maxLength: 500
  measurement_unit_id:
    type: integer
    description: Must exist in `measurement_units`.
  accounting_type:
    type: integer
    enum: [1, 2, 3, 4, 5]
  tax_id:
    type: integer
    description: Must exist in `taxes` for the company from `X-Asseblo-Company`.
  group_id:
    type: integer
    nullable: true
    description: Product group; must belong to company if > 0. Omitted or 0 for ungrouped.
  expense_id:
    type: integer
    nullable: true
    description: Optional expense; must exist in `expenses` for the company.
  catalog_code: { type: string, nullable: true, maxLength: 255 }
  cpv_code: { type: string, nullable: true, maxLength: 255 }
  accounting_code: { type: string, nullable: true, maxLength: 255 }
  cost_price: { type: number, nullable: true }
  sell_price: { type: number, nullable: true }
  sell_lock: { type: integer, enum: [0, 1], nullable: true }
  retail_price: { type: number, nullable: true }
  website_price: { type: number, nullable: true }
  discounted_price: { type: number, nullable: true }
  description: { type: string, nullable: true }
  barcode: { type: string, nullable: true, maxLength: 255 }
  special_rules: { type: integer, enum: [0, 1, 2], nullable: true }
  count_storage: { type: boolean, nullable: true }
  initial_stock: { type: number, nullable: true }
  branch_id:
    type: integer
    nullable: true
    description: Must exist in `branches` for the company.
  check_stock: { type: boolean, nullable: true }
  stock_alert: { type: number, nullable: true }
  show_on_website: { type: boolean, nullable: true }
  show_on_b2b: { type: boolean, nullable: true }
  show_on_sales: { type: boolean, nullable: true }
  show_on_puzzle: { type: boolean, nullable: true }
  show_on_purchase: { type: boolean, nullable: true }
  show_on_retail: { type: boolean, nullable: true }
  characteristic_ids:
    type: array
    items: { type: integer }
    description: Characteristic IDs belonging to the company.
  supplier_ids:
    type: array
    items: { type: integer }
    description: Supplier IDs (non-courier suppliers for the company).
  suppliers:
    type: array
    items:
      type: object
      additionalProperties: false
      properties:
        supplier_id: { type: integer }
        supplier_code: { type: string, nullable: true, maxLength: 255 }
        supplier_name: { type: string, nullable: true, maxLength: 255 }
        product_cost: { type: number, nullable: true }
  catalogues:
    type: array
    items:
      type: object
      additionalProperties: false
      properties:
        catalogue_id: { type: integer }
        ratio: { type: number, nullable: true }
  serial_numbers:
    type: array
    items: { type: string, maxLength: 255 }
  tiers:
    type: array
    items:
      type: object
      additionalProperties: true
      properties:
        min_quantity: {}
        max_quantity: {}
        retail: { type: number, nullable: true }
        profit: { type: number, nullable: true }
        price: { type: number, nullable: true }
        fixed: { type: number, nullable: true }
  tags:
    type: array
    items: { type: string, maxLength: 255 }
required:
  - product_name
  - measurement_unit_id
  - accounting_type
  - tax_id
