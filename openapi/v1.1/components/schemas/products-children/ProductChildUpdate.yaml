type: object
additionalProperties: false
description: >
  Update product child. Same fields as create where applicable; send only fields to change
  (`UpdateProductChildRequest` — rules align with store for company-scoped relations).
properties:
  product_name: { type: string, maxLength: 500 }
  measurement_unit_id: { type: integer }
  accounting_type: { type: integer, enum: [1, 2, 3, 4, 5] }
  tax_id: { type: integer }
  group_id: { type: integer, nullable: true }
  expense_id: { type: integer, nullable: true }
  catalog_code: { type: string, nullable: true, maxLength: 255 }
  cpv_code: { type: string, nullable: true, maxLength: 255 }
  accounting_code: { type: string, nullable: true, maxLength: 255 }
  cost_price: { type: number, nullable: true }
  sell_price: { type: number, nullable: true }
  sell_lock: { type: integer, enum: [0, 1], nullable: true }
  retail_price: { type: number, nullable: true }
  website_price: { type: number, nullable: true }
  discounted_price: { type: number, nullable: true }
  description: { type: string, nullable: true }
  barcode: { type: string, nullable: true, maxLength: 255 }
  special_rules: { type: integer, enum: [0, 1, 2], nullable: true }
  count_storage: { type: boolean, nullable: true }
  initial_stock: { type: number, nullable: true }
  branch_id: { type: integer, nullable: true }
  check_stock: { type: boolean, nullable: true }
  stock_alert: { type: number, nullable: true }
  show_on_website: { type: boolean, nullable: true }
  show_on_b2b: { type: boolean, nullable: true }
  show_on_sales: { type: boolean, nullable: true }
  show_on_puzzle: { type: boolean, nullable: true }
  show_on_purchase: { type: boolean, nullable: true }
  show_on_retail: { type: boolean, nullable: true }
  characteristic_ids:
    type: array
    items: { type: integer }
  supplier_ids:
    type: array
    items: { type: integer }
  suppliers:
    type: array
    items:
      type: object
      additionalProperties: false
      properties:
        supplier_id: { type: integer }
        supplier_code: { type: string, nullable: true, maxLength: 255 }
        supplier_name: { type: string, nullable: true, maxLength: 255 }
        product_cost: { type: number, nullable: true }
  catalogues:
    type: array
    items:
      type: object
      additionalProperties: false
      properties:
        catalogue_id: { type: integer }
        ratio: { type: number, nullable: true }
  serial_numbers:
    type: array
    items: { type: string, maxLength: 255 }
  tiers:
    type: array
    items:
      type: object
      additionalProperties: true
  tags:
    type: array
    items: { type: string, maxLength: 255 }
