get:
  tags: [Invoice Types]
  summary: Invoice type (show)
  security:
    - BearerAuth: []
  parameters:
    - $ref: ../../../_shared/components/parameters/IdPath.yaml
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/invoice-types/InvoiceTypeSingleResponse.yaml
          examples:
            default:
              value:
                success: true
                data:
                  id: 1166
                  title: "Invoice (no delivery)"
                  type: 1
                  aade_type: "1.1"
                  document_type: null
                  active: true
                  is_deliverable: false
                  default: true
                  template_id: null
                  company: 1
    "401": { $ref: ../../../_shared/components/responses/Unauthorized.yaml }
    "403": { $ref: ../../../_shared/components/responses/Forbidden.yaml }
    "404": { $ref: ../../../_shared/components/responses/NotFound.yaml }

post:
  tags: [Invoice Types]
  summary: Invoice type (create)
  description: >
    Creates an invoice type. If `default=true`, other invoice types with same (type, document_type)
    are set to default=false. If `default=false` and no other default exists, backend forces default=true.
  security:
    - BearerAuth: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/invoice-types/InvoiceTypeStore.yaml
        examples:
          default:
            value:
              title: "Invoice (no delivery)"
              type: 1
              aade_type: "1.1"
              document_type: null
              fhm_code: null
              active: true
              is_deliverable: false
              default: true
              template_id: null
  responses:
    "201":
      description: Created
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/invoice-types/InvoiceTypeSingleResponse.yaml
    "401": { $ref: ../../../_shared/components/responses/Unauthorized.yaml }
    "403": { $ref: ../../../_shared/components/responses/Forbidden.yaml }
    "422": { $ref: ../../../_shared/components/responses/UnprocessableEntity.yaml }

delete:
  tags: [Invoice Types]
  summary: Invoice type (delete)
  description: |
    Deletes an invoice type (document type). Cannot delete the default type for its category.
    Returns 404 if the type does not exist or belongs to another company (same message as not found).
  security:
    - BearerAuth: []
  parameters:
    - $ref: ../../../_shared/components/parameters/IdPath.yaml
  responses:
    "200":
      description: Deleted
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/common/SuccessMessageResponse.yaml
          examples:
            deleted:
              value:
                success: true
                message: "Invoice type deleted."
    "401": { $ref: ../../../_shared/components/responses/Unauthorized.yaml }
    "403": { $ref: ../../../_shared/components/responses/Forbidden.yaml }
    "404":
      description: Not found (unknown id or not in company scope)
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/common/FailureMessageResponse.yaml
          examples:
            notFound:
              value:
                success: false
                message: "Invoice type not found"
    "409":
      description: Conflict — cannot delete (related invoices, supplier invoices, or branch links)
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/common/FailureMessageResponse.yaml
          examples:
            conflict:
              value:
                success: false
                message: "Invoice type cannot be deleted because it has related invoices, supplier invoices, or branch links."
    "422":
      description: Cannot delete default document type for this category
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/common/FailureMessageResponse.yaml
          examples:
            defaultType:
              value:
                success: false
                message: "Cannot delete the default document type for this category."
