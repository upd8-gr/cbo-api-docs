get:
  tags: [Product Children]
  summary: Product children (list)
  description: |
    Lists product children for the company from `X-Asseblo-Company`. Supports search on
    `product_name`, `catalog_code`, `barcode`, `erp_code`; optional filters `group_id` and `visibility`;
    sorting and pagination (`page_size` default 50, max 100). If `stock` is provided, each returned
    item exposes partial stock output instead of the default full stock output.
    Response: `{ success, data[], meta }`.
  security:
    - BearerAuth: []
  parameters:
    - name: search
      in: query
      required: false
      schema: { type: string }
      description: Search across product name, catalog code, barcode, ERP code.
    - name: group_id
      in: query
      required: false
      schema: { type: integer }
    - name: visibility
      in: query
      required: false
      description: Filter by visibility flag (0/1).
      schema: { type: boolean }
    - name: sort_by
      in: query
      required: false
      schema:
        type: string
        enum: [id, product_name, catalog_code, primary_id, sell_price, created_at, updated_at]
      example: id
    - name: sort_order
      in: query
      required: false
      schema:
        type: string
        enum: [asc, desc]
      example: asc
    - name: page
      in: query
      required: false
      schema: { type: integer, minimum: 1, default: 1 }
    - name: page_size
      in: query
      required: false
      description: Page size (default 50, max 100).
      schema: { type: integer, minimum: 1, maximum: 100, default: 50 }
    - name: stock
      in: query
      required: false
      description: Backend-defined stock selector used to return partial stock values per item.
      schema: { type: string }
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/products-children/ProductChildIndexResponse.yaml
    "401": { $ref: ../../../_shared/components/responses/Unauthorized.yaml }
    "403": { $ref: ../../../_shared/components/responses/Forbidden.yaml }

post:
  tags: [Product Children]
  summary: Product child (create)
  description: |
    Creates a product child for the company. On validation/runtime errors from the store service,
    returns **422**. Validation errors use the framework validation payload; business/runtime errors from
    the store service return `{ success: false, message }`. On unexpected failure, **500** with message.
  security:
    - BearerAuth: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/products-children/ProductChildStore.yaml
  responses:
    "201":
      description: Created
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/products-children/ProductChildSingleResponse.yaml
    "401": { $ref: ../../../_shared/components/responses/Unauthorized.yaml }
    "403": { $ref: ../../../_shared/components/responses/Forbidden.yaml }
    "422":
      description: Validation or business error from store service
      content:
        application/json:
          oneOf:
            - $ref: ../../../_shared/components/schemas/errors/ValidationError.yaml
            - $ref: ../../components/schemas/common/FailureMessageResponse.yaml
    "500":
      description: Unexpected error while creating product
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/common/FailureMessageResponse.yaml
          examples:
            server:
              value:
                success: false
                message: "Failed to create product: ..."
