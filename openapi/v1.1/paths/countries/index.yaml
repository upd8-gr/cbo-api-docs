get:
  tags: [Countries]
  summary: Countries (list)
  description: |
    Lists countries. Supports exact filtering by `code`, partial filtering by `name`, and pagination.
    Response is wrapped as `{ success, data, meta }`.
  security:
    - BearerAuth: []
  parameters:
    - name: code
      in: query
      required: false
      description: Exact country code filter.
      schema: { type: string }
      example: GR
    - name: name
      in: query
      required: false
      description: Partial country name filter using SQL `LIKE`.
      schema: { type: string }
      example: Greek
    - name: page
      in: query
      required: false
      schema: { type: integer, minimum: 1, default: 1 }
    - name: page_size
      in: query
      required: false
      description: Page size (default 50, max 100).
      schema: { type: integer, minimum: 1, maximum: 100, default: 50 }
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/countries/CountryIndexResponse.yaml
    "401": { $ref: ../../../_shared/components/responses/Unauthorized.yaml }
    "403": { $ref: ../../../_shared/components/responses/Forbidden.yaml }